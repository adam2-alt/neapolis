<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neapolis — Ristorante Italiano</title>
<meta name="description" content="Neapolis — Authentic flavors, fresh ingredients, and unforgettable moments.">

<!-- Fonts: Playfair Display for the wordmark, Poppins for everything else -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* ============================================================
     DESIGN TOKENS
     ============================================================ */
  :root{
    --cream:        #FBF4E7;
    --cream-deep:    #F2E6CC;
    --green:        #163A2E;
    --green-deep:    #0D2620;
    --green-soft:    #2C5240;
    --gold:          #C9A24B;
    --gold-light:    #E9CE8E;
    --ink:           #2A2018;
    --ink-soft:      #6B5F52;

    --font-display: 'Playfair Display', serif;
    --font-body:    'Poppins', sans-serif;

    --radius-lg: 22px;
    --radius-md: 14px;
    --shadow-soft: 0 10px 30px rgba(22, 58, 46, 0.10);
    --shadow-lift: 0 18px 40px rgba(22, 58, 46, 0.22);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html{ scroll-behavior:smooth; }

  body{
    font-family: var(--font-body);
    color: var(--ink);
    background: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ============================================================
     BACKGROUND — soft Mediterranean wash instead of a stock photo.
     Warm cream base with two low-opacity glows (gold & deep green)
     standing in for sun-on-terracotta and shaded loggia.
     Swap in a real blurred photo by uncommenting the "background:
     photo" rule below if a restaurant image is preferred.
     ============================================================ */
  .page-bg{
    position: fixed;
    inset: 0;
    z-index: -2;
    background:
      radial-gradient(ellipse 900px 600px at 15% -5%, rgba(201,162,75,0.20), transparent 60%),
      radial-gradient(ellipse 800px 700px at 105% 100%, rgba(22,58,46,0.16), transparent 60%),
      linear-gradient(180deg, var(--cream) 0%, var(--cream-deep) 100%);
  }
  /* Optional photographic background (replace URL, keep the blur):
  .page-bg{
    background: url('assets/hero-photo.jpg') center/cover no-repeat;
    filter: blur(6px) brightness(0.9);
    transform: scale(1.05);
  }
  */

  .page-bg::after{
    content:'';
    position:absolute; inset:0;
    background-image:
      radial-gradient(rgba(42,32,24,0.05) 1px, transparent 1px);
    background-size: 22px 22px;
    opacity:0.5;
  }

  /* ============================================================
     LAYOUT SHELL
     ============================================================ */
  .container{
    min-height: 100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding: 64px 24px 40px;
    text-align:center;
  }

  /* ============================================================
     LOGO
     ============================================================ */
  .logo-wrap{
    opacity:0;
    animation: fadeInUp 0.9s ease forwards;
    animation-delay: 0.1s;
  }

  /* >>> REPLACE LOGO HERE <<<
     Point #logo-img at your image file. If it fails to load (or is
     left as-is), the styled text wordmark below shows automatically. */
  #logo-img{
    max-width: 190px;
    max-height: 190px;
    width:auto;
    display:block;
    margin: 0 auto 6px;
  }

  .logo-text{
    display:none; /* shown by JS fallback if the image can't load */
    flex-direction:column;
    align-items:center;
    gap:4px;
  }
  .logo-text .mark{
    width:64px; height:64px;
    border-radius:50%;
    border:1.5px solid var(--gold);
    display:flex; align-items:center; justify-content:center;
    margin-bottom:10px;
    background: var(--green);
    box-shadow: var(--shadow-soft);
  }
  .logo-text .mark svg{ width:30px; height:30px; }

  .logo-title{
    font-family: var(--font-display);
    font-weight:600;
    font-style: italic;
    font-size: clamp(2.4rem, 6vw, 3.4rem);
    letter-spacing: 0.03em;
    color: var(--green);
    line-height:1;
  }
  .logo-sub{
    font-family: var(--font-body);
    font-weight:500;
    font-size: 0.72rem;
    letter-spacing: 0.42em;
    text-transform:uppercase;
    color: var(--gold);
    margin-top:10px;
  }

  /* ============================================================
     WELCOME TEXT
     ============================================================ */
  .welcome{
    max-width: 480px;
    margin: 26px auto 0;
    font-size: 1rem;
    line-height:1.7;
    color: var(--ink-soft);
    font-weight:400;
    opacity:0;
    animation: fadeInUp 0.9s ease forwards;
    animation-delay: 0.28s;
  }
  .welcome strong{
    color: var(--green);
    font-weight:600;
  }

  /* ============================================================
     SIGNATURE DIVIDER — a small hand-drawn majolica / sun motif,
     nodding to Amalfi-coast tilework, in gold + green.
     ============================================================ */
  .divider{
    width: 100%;
    max-width: 260px;
    margin: 30px auto 34px;
    opacity:0;
    animation: fadeInUp 0.9s ease forwards;
    animation-delay: 0.4s;
  }
  .divider svg{ width:100%; height:auto; display:block; }

  /* ============================================================
     BUTTONS
     ============================================================ */
  .actions{
    width:100%;
    max-width: 420px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }

  .btn{
    position:relative;
    display:flex;
    align-items:center;
    gap:16px;
    width:100%;
    padding: 18px 26px;
    border-radius: var(--radius-lg);
    background: var(--green);
    color: var(--cream);
    text-decoration:none;
    font-family: var(--font-body);
    font-weight:500;
    font-size: 1.02rem;
    letter-spacing:0.02em;
    box-shadow: var(--shadow-soft);
    border: 1px solid rgba(201,162,75,0.35);
    overflow:hidden;
    isolation:isolate;
    cursor:pointer;
    transition: transform 0.35s cubic-bezier(.2,.8,.2,1),
                box-shadow 0.35s ease,
                color 0.35s ease,
                border-color 0.35s ease;

    opacity:0;
    animation: fadeInUp 0.8s ease forwards;
  }
  .btn:nth-of-type(1){ animation-delay: 0.55s; }
  .btn:nth-of-type(2){ animation-delay: 0.68s; }
  .btn:nth-of-type(3){ animation-delay: 0.81s; }
  .btn:nth-of-type(4){ animation-delay: 0.94s; }

  .btn::before{
    content:'';
    position:absolute;
    inset:0;
    z-index:-1;
    background: linear-gradient(120deg, var(--gold-light), var(--gold));
    transform: translateX(-101%);
    transition: transform 0.45s cubic-bezier(.2,.8,.2,1);
  }

  .btn:hover,
  .btn:focus-visible{
    color: var(--green-deep);
    transform: translateY(-4px);
    box-shadow: var(--shadow-lift);
    border-color: var(--gold);
  }
  .btn:hover::before,
  .btn:focus-visible::before{
    transform: translateX(0%);
  }
  .btn:active{ transform: translateY(-1px) scale(0.99); }
  .btn:focus-visible{ outline: 2px solid var(--green); outline-offset: 3px; }

  .btn .icon{
    flex: 0 0 auto;
    width:42px; height:42px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background: rgba(251,244,231,0.12);
    transition: background 0.35s ease;
  }
  .btn:hover .icon{ background: rgba(13,38,32,0.12); }
  .btn .icon svg{ width:20px; height:20px; }

  .btn .label{ flex:1; text-align:left; }
  .btn .label small{
    display:block;
    font-size:0.7rem;
    font-weight:400;
    letter-spacing:0.05em;
    opacity:0.72;
    margin-top:2px;
  }

  .btn .arrow{
    flex: 0 0 auto;
    opacity:0.55;
    transform: translateX(0);
    transition: transform 0.35s ease, opacity 0.35s ease;
  }
  .btn:hover .arrow{ transform: translateX(4px); opacity:1; }

  /* ============================================================
     FOOTER
     ============================================================ */
  footer{
    margin-top: 52px;
    font-size: 0.78rem;
    color: var(--ink-soft);
    letter-spacing: 0.03em;
    opacity:0;
    animation: fadeInUp 0.9s ease forwards;
    animation-delay: 1.1s;
  }
  footer .rule{
    width:40px; height:1px;
    background: var(--gold);
    margin: 0 auto 14px;
    opacity:0.6;
  }

  /* ============================================================
     ANIMATION
     ============================================================ */
  @keyframes fadeInUp{
    from{ opacity:0; transform: translateY(16px); }
    to{ opacity:1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; animation-delay:0s !important; transition-duration:0.01ms !important; }
  }

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media (max-width: 480px){
    .container{ padding: 48px 18px 32px; }
    .logo-title{ font-size: 2.1rem; }
    .btn{ padding:16px 18px; font-size:0.95rem; gap:12px; }
    .btn .icon{ width:38px; height:38px; }
  }

  @media (min-width: 720px){
    .actions{ max-width: 460px; }
  }
</style>
</head>
<body>

<div class="page-bg" aria-hidden="true"></div>

<main class="container">

  <!-- ============ LOGO ============ -->
  <div class="logo-wrap">
    <!-- >>> TO REPLACE THE LOGO: change the src below to your logo file path.
         If the image fails to load, a styled text wordmark is shown automatically. -->
    <img id="logo-img" src="neapolis" alt="Neapolis logo">

    <div class="logo-text" id="logo-fallback">
      <span class="mark">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9" stroke="#E9CE8E" stroke-width="1.2"/>
          <path d="M12 3v18M3 12h18" stroke="#E9CE8E" stroke-width="1" opacity="0.5"/>
        </svg>
      </span>
      <span class="logo-title">Neapolis</span>
      <span class="logo-sub">Ristorante&nbsp;Italiano</span>
    </div>
  </div>

  <!-- ============ WELCOME TEXT ============ -->
  <p class="welcome">
    Welcome to <strong>Neapolis</strong>. Authentic flavors, fresh ingredients,
    and unforgettable moments.
  </p>

  <!-- ============ SIGNATURE DIVIDER (majolica motif) ============ -->
  <div class="divider" aria-hidden="true">
    <svg viewBox="0 0 260 28" xmlns="http://www.w3.org/2000/svg">
      <line x1="0" y1="14" x2="95" y2="14" stroke="#C9A24B" stroke-width="1" opacity="0.5"/>
      <line x1="165" y1="14" x2="260" y2="14" stroke="#C9A24B" stroke-width="1" opacity="0.5"/>
      <g transform="translate(130,14)">
        <circle r="9" fill="none" stroke="#163A2E" stroke-width="1.1"/>
        <path d="M0,-9 L2.3,-2.8 L9,0 L2.3,2.8 L0,9 L-2.3,2.8 L-9,0 L-2.3,-2.8 Z" fill="#C9A24B" opacity="0.85"/>
      </g>
      <circle cx="112" cy="14" r="2" fill="#163A2E" opacity="0.4"/>
      <circle cx="148" cy="14" r="2" fill="#163A2E" opacity="0.4"/>
    </svg>
  </div>

  <!-- ============ ACTION BUTTONS ============
       >>> TO REPLACE LINKS: edit the LINKS object near the top of the
       <script> block at the bottom of this file. Each button below
       reads its href from there via JavaScript, and also has a plain
       href fallback so it still works if JS is disabled. -->
  <nav class="actions" aria-label="Connect with Neapolis">

    <a class="btn" id="btn-facebook" href="https://www.facebook.com/share/1BQHD3y5Hb/" target="_blank" rel="noopener noreferrer">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 13.5h2.5l1-4H14v-2c0-1.03 0-2 2-2h1.5V2.14C17.17 2.1 15.9 2 14.6 2 11.9 2 10 3.66 10 6.7v2.8H7v4h3V22h4v-8.5Z"/></svg>
      </span>
      <span class="label">Facebook<small>See our latest updates</small></span>
      <svg class="arrow" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>

    <a class="btn" id="btn-instagram" href="https://instagram.com" target="_blank" rel="noopener noreferrer">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.2" cy="6.8" r="1" fill="currentColor" stroke="none"/></svg>
      </span>
      <span class="label">Instagram<small>Follow our kitchen &amp; stories</small></span>
      <svg class="arrow" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>

    <a class="btn" id="btn-whatsapp" href="https://wa.me/10000000000" target="_blank" rel="noopener noreferrer">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5.1-1.3A10 10 0 1 0 12 2Zm0 18.2a8.2 8.2 0 0 1-4.2-1.2l-.3-.2-3 .8.8-2.9-.2-.3A8.2 8.2 0 1 1 12 20.2Zm4.5-6.2c-.2-.1-1.5-.7-1.7-.8-.2-.1-.4-.1-.6.1-.2.2-.7.8-.8 1-.2.2-.3.2-.5.1-.2-.1-1-.4-1.9-1.2-.7-.6-1.2-1.4-1.3-1.6-.2-.2 0-.4.1-.5l.4-.5c.1-.2.2-.3.2-.5.1-.2 0-.4 0-.5-.1-.1-.6-1.5-.8-2-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.5.1-.7.3-.3.3-1 1-1 2.4s1 2.8 1.2 3c.1.2 2 3.1 4.9 4.3.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.5-.1 1.5-.6 1.8-1.2.2-.6.2-1.1.2-1.2-.1-.2-.3-.2-.5-.3Z"/></svg>
      </span>
      <span class="label">WhatsApp<small>Message us directly</small></span>
      <svg class="arrow" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>

    <a class="btn" id="btn-menu" href="menu" target="_blank" rel="noopener noreferrer">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 4.5A1.5 1.5 0 0 1 5.5 3H12v18H5.5A1.5 1.5 0 0 1 4 19.5v-15Z"/><path d="M20 4.5A1.5 1.5 0 0 0 18.5 3H12v18h6.5a1.5 1.5 0 0 0 1.5-1.5v-15Z"/></svg>
      </span>
      <span class="label">Menu<small>Explore our dishes</small></span>
      <svg class="arrow" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>

  </nav>

  <!-- ============ FOOTER ============ -->
  <footer>
    <div class="rule" aria-hidden="true"></div>
    &copy; 2026 Neapolis. All Rights Reserved.
  </footer>

</main>

<script>
  /* ============================================================
     CONFIGURATION — edit this block to update links and logo.
     ============================================================ */
  const LINKS = {
    facebook:  "https://www.facebook.com/share/1BQHD3y5Hb/",
    instagram: "https://www.instagram.com/neapolis.resturant?igsh=bGJ5eWNzMHlwbmM1",
    whatsapp:  "https://wa.me/+972599715615",        // use full international number, no +/spaces
    menu:      "menu"                          // or an external URL to your digital menu
  };

  const LOGO_SRC = "neapolis.jpg"; // path to the logo image file

  // Apply configuration
  document.getElementById("btn-facebook").href  = LINKS.facebook;
  document.getElementById("btn-instagram").href = LINKS.instagram;
  document.getElementById("btn-whatsapp").href  = LINKS.whatsapp;
  document.getElementById("btn-menu").href      = LINKS.menu;

  const logoImg = document.getElementById("logo-img");
  logoImg.src = LOGO_SRC;

  // If the logo image can't be found, show the styled text wordmark instead.
  logoImg.addEventListener("error", () => {
    logoImg.style.display = "none";
    document.getElementById("logo-fallback").style.display = "flex";
  });
</script>

</body>
</html>
